name: simple-url-shortener

services:
  db-migrator_url-shortener:
    build:
      context: ../services/SimpleUrlShortener.UrlShortener
      dockerfile: src/SimpleUrlShortener.UrlShortener.DbMigrator/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
    networks:
      - database
    restart: no
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 30mb
    depends_on:
      postgresql:
        condition: service_healthy

  db-migrator_analytics-collector:
    build:
      context: ../services/SimpleUrlShortener.AnalyticsCollector
      dockerfile: src/SimpleUrlShortener.AnalyticsCollector.DbMigrator/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
    networks:
      - database
    restart: no
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 30mb
    depends_on:
      postgresql:
        condition: service_healthy

  db-migrator_url-lifetime-manager:
    build:
      context: ../services/SimpleUrlShortener.UrlLifetimeManager
      dockerfile: src/SimpleUrlShortener.UrlLifetimeManager.DbMigrator/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
    networks:
      - database
    restart: no
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 30mb
    depends_on:
      postgresql:
        condition: service_healthy

  url-shortener:
    build:
      context: ../services/SimpleUrlShortener.UrlShortener
      dockerfile: src/SimpleUrlShortener.UrlShortener.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
      RabbitMqConnectionSettings__Host: rabbitmq
      RabbitMqConnectionSettings__Port: 5672
      RabbitMqConnectionSettings__VirtualHost: "/"
      RabbitMqConnectionSettings__UserName: root
      RabbitMqConnectionSettings__Password: password
    ports:
      - "25000:8080"
    networks:
      - backend
      - database
      - messaging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 300mb
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      db-migrator_url-shortener:
        condition: service_completed_successfully

  analytics-collector:
    build:
      context: ../services/SimpleUrlShortener.AnalyticsCollector
      dockerfile: src/SimpleUrlShortener.AnalyticsCollector.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
      RabbitMqConnectionSettings__Host: rabbitmq
      RabbitMqConnectionSettings__Port: 5672
      RabbitMqConnectionSettings__VirtualHost: "/"
      RabbitMqConnectionSettings__UserName: root
      RabbitMqConnectionSettings__Password: password
    ports:
      - "25001:8080"
    networks:
      - backend
      - database
      - messaging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 300mb
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      db-migrator_analytics-collector:
        condition: service_completed_successfully

  url-lifetime-manager:
    build:
      context: ../services/SimpleUrlShortener.UrlLifetimeManager
      dockerfile: src/SimpleUrlShortener.UrlLifetimeManager.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgresql; Port=5432; Database=SimpleUrlShortener; Username=root; Password=password; Pooling=true; Minimum Pool Size=0; Maximum Pool Size=100;"
      RabbitMqConnectionSettings__Host: rabbitmq
      RabbitMqConnectionSettings__Port: 5672
      RabbitMqConnectionSettings__VirtualHost: "/"
      RabbitMqConnectionSettings__UserName: root
      RabbitMqConnectionSettings__Password: password
      Clients__UrlShortener__Url: "http://url-shortener"
    ports:
      - "25002:8080"
    networks:
      - backend
      - database
      - messaging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 300mb
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      url-shortener:
        condition: service_started
      db-migrator_url-lifetime-manager:
        condition: service_completed_successfully

  postgresql:
    image: postgres:18.1-alpine3.23
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: SimpleUrlShortener
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgresql_data:/var/lib/postgresql
#    ports:
#      - "5432:5432"
    networks:
      - database
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d SimpleUrlShortener" ]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "app=postgresql"
      - "env=production"
      - "version=18.1"

  rabbitmq:
    image: rabbitmq:4.2.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_DEFAULT_VHOST: /
    configs:
      - source: rabbitmq_config
        target: /etc/rabbitmq/rabbitmq.conf
        mode: 0444
      - source: rabbitmq_plugins
        target: /etc/rabbitmq/enabled_plugins
        mode: 0444
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    ports:
#      - "5672:5672"    # AMQP порт для клиентских подключений
      - "127.0.0.1:15672:15672"  # HTTP API, management UI и rabbitmqadmin
#      - "25672:25672"  # порт для межузлового взаимодействия в кластере
    networks:
      - messaging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s
    labels:
      - "app=rabbitmq"
      - "env=production"
      - "version=4.2.2"

  pgadmin:
    image: dpage/pgadmin4:9.11.0
    environment:
      PGADMIN_DEFAULT_EMAIL: simpleurlshortener@domain.com
      PGADMIN_DEFAULT_PASSWORD: simpleurlshortener
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:24999:80"
    networks:
      - database
    restart: always

configs:
  rabbitmq_config:
    file: ./configs/rabbitmq/rabbitmq.conf
  rabbitmq_plugins:
    file: ./configs/rabbitmq/enabled_plugins

volumes:
  postgresql_data:
    name: "postgresql"
  rabbitmq_data:
    name: "rabbitmq"
  pgadmin_data:
    name: "pgadmin"

networks:
  backend:
    driver: bridge
  database:
    driver: bridge
  messaging:
    driver: bridge